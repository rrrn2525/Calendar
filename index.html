<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>カレンダー</title>

<style>
* { box-sizing: border-box; }
body {
  font-family: system-ui, sans-serif;
  margin: 0;
  padding: 0;
  background: #f5f5f5;
}

.calendar-wrapper {
  max-width: 390px;
  width: 100%;
  margin: 0 auto;
  padding: 10px;
  background: #fff;
  min-height: 100vh;
}

.selected-day {
  background: #dcdcdc !important;
}

.ym-select {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}
.ym-select select {
  width: 48%;
  padding: 6px;
}

.cal-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
}

.cal-title {
  font-weight: bold;
  font-size: 18px;
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
}

.dow {
  text-align: center;
  padding: 4px 0;
  background: #eee;
  font-size: 12px;
  font-weight: bold;
}

.day-cell {
  min-height: 52px;
  width: 100%;
  overflow: hidden;
  background: #fafafa;
  border-radius: 4px;
  padding: 2px;
  font-size: 11px;
  position: relative;
}

.today div:first-child {
  background: black;
  color: white;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 0 auto;
}

.event {
  margin-top: 2px;
  padding: 1px 2px;
  border-radius: 3px;
  color: #fff;
  font-size: 10px;
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* モーダル */
.modal-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.modal {
  background: #fff;
  padding: 15px;
  width: 90%;
  max-width: 360px;
  border-radius: 8px;
}

/* 日曜・土曜（正しい位置） */
.calendar-grid > div:nth-child(7n + 8) div:first-child { color: red; }
.calendar-grid > div:nth-child(7n + 14) div:first-child { color: blue; }

/* サジェスト */
#titleSuggest {
  border: 1px solid #ccc;
  background: #fff;
  max-height: 120px;
  overflow-y: auto;
  margin-bottom: 8px;
}
.suggest-item {
  padding: 6px;
  border-bottom: 1px solid #eee;
  cursor: pointer;
}
.suggest-item:hover {
  background: #f0f0f0;
}

/* 色ボタン */
.color-buttons {
  display: flex;
  margin: 8px 0;
}
.color-buttons button {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: none;
  margin-right: 8px;
  position: relative;
}
.color-buttons button.selected::after {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  width: 10px;
  height: 10px;
  background: white;
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

.btn-row {
  display: flex;
  justify-content: space-between;
}

#dayEventList, #allEventList {
  margin-top: 15px;
  padding: 10px;
  background: #fff;
  border-radius: 6px;
}

.digit-label {
  text-align: center;
  width: 100%;
  margin-top: 4px;
}

</style>
</head>

<body>

<div class="calendar-wrapper" id="swipeArea">

  <div class="ym-select">
    <select id="yearSelect"></select>
    <select id="monthSelect"></select>
  </div>

  <div class="cal-header">
    <button id="prevMonth">&lt;</button>
    <div class="cal-title" id="calTitle"></div>
    <button id="nextMonth">&gt;</button>
  </div>

  <div class="calendar-grid" id="calendar"></div>

  <div id="dayEventList"></div>

  <div id="allEventList"></div>

</div>

<!-- モーダル -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle">予定を追加</h3>

    <input type="text" id="modalEventTitle" placeholder="予定タイトル">
    <div id="titleSuggest" style="display:none;"></div>

    <select id="modalRepeat">
      <option value="none">繰り返しなし</option>
      <option value="weekly">毎週</option>
      <option value="monthly">毎月</option>
      <option value="yearly">毎年</option>
    </select>

    <div class="digit-boxes" id="digitBoxes">
      <div class="digit-row">
        <label><input type="checkbox" value="0">0</label>
        <label><input type="checkbox" value="1">1</label>
        <label><input type="checkbox" value="2">2</label>
        <label><input type="checkbox" value="3">3</label>
        <label><input type="checkbox" value="4">4</label>
        <label><input type="checkbox" value="5">5</label>
        <label><input type="checkbox" value="6">6</label>
        <label><input type="checkbox" value="7">7</label>
        <label><input type="checkbox" value="8">8</label>
        <label><input type="checkbox" value="9">9</label>
      </div>
      <div class="digit-label">がつく日</div>
    </div>

    <div class="color-buttons" id="modalColors">
      <button data-color="#007bff" style="background:#007bff"></button>
      <button data-color="#28a745" style="background:#28a745"></button>
      <button data-color="#ffc107" style="background:#ffc107"></button>
      <button data-color="#dc3545" style="background:#dc3545"></button>
      <button data-color="#6f42c1" style="background:#6f42c1"></button>
    </div>

    <div class="btn-row">
      <button id="modalSave">保存</button>
      <button id="modalDelete" style="background:#dc3545;color:#fff;display:none;">削除</button>
      <button id="modalClose">閉じる</button>
    </div>
  </div>
</div>

<script>
/* -------------------------
   基本変数
------------------------- */
let events = [];
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let selectedCell = null;
let selectedDate = null;
let editingId = null;
let modalColor = "#007bff";

/* -------------------------
   保存・読み込み
------------------------- */
function saveEvents() {
  localStorage.setItem("calendarEvents", JSON.stringify(events));
}
function loadEvents() {
  const data = localStorage.getItem("calendarEvents");
  if (data) events = JSON.parse(data);
}
loadEvents();

/* -------------------------
   年月選択
------------------------- */
function initYM() {
  const yearSel = document.getElementById("yearSelect");
  const monthSel = document.getElementById("monthSelect");
  const thisYear = new Date().getFullYear();

  // 年の選択肢
  for (let y = thisYear - 5; y <= thisYear + 5; y++) {
    const op = document.createElement("option");
    op.value = y;
    op.textContent = y + "年";
    if (y === currentYear) op.selected = true;
    yearSel.appendChild(op);
  }

  // 月の選択肢
  for (let m = 1; m <= 12; m++) {
    const op = document.createElement("option");
    op.value = m - 1;
    op.textContent = m + "月";
    if (m - 1 === currentMonth) op.selected = true;
    monthSel.appendChild(op);
  }
}

/* ▼ 年を変更したら即反映 */
document.getElementById("yearSelect").onchange = () => {
  currentYear = Number(document.getElementById("yearSelect").value);
  renderCalendar();
};

/* ▼ 月を変更したら即反映 */
document.getElementById("monthSelect").onchange = () => {
  currentMonth = Number(document.getElementById("monthSelect").value);
  renderCalendar();
};


/* -------------------------
   カレンダー描画
------------------------- */
const calendarEl = document.getElementById("calendar");
const calTitleEl = document.getElementById("calTitle");

function renderCalendar() {
  calendarEl.innerHTML = "";

  const dow = ["日","月","火","水","木","金","土"];
  dow.forEach(d => {
    const h = document.createElement("div");
    h.className = "dow";
    h.textContent = d;
    calendarEl.appendChild(h);
  });

  const first = new Date(currentYear, currentMonth, 1);
  const startDow = first.getDay();
  const days = new Date(currentYear, currentMonth + 1, 0).getDate();

  calTitleEl.textContent = `${currentYear}年 ${currentMonth+1}月`;

  for (let i=0;i<startDow;i++){
    const empty = document.createElement("div");
    empty.className = "day-cell";
    calendarEl.appendChild(empty);
  }

  for (let d=1; d<=days; d++){
    const cell = document.createElement("div");
    cell.className = "day-cell";

    const dateObj = new Date(currentYear, currentMonth, d);
    const dateStr = toStr(dateObj);

    if (isSame(dateObj, new Date())) cell.classList.add("today");

    const num = document.createElement("div");
    num.textContent = d;
    num.style.fontWeight = "bold";
    cell.appendChild(num);

    getEvents(dateObj).forEach(ev => {
      const evEl = document.createElement("div");
      evEl.className = "event";
      evEl.style.background = ev.color;
      evEl.textContent = ev.title;
      evEl.dataset.id = ev.id;

      evEl.addEventListener("click", e => {
        e.stopPropagation();
        openEdit(ev.id);
      });

      cell.appendChild(evEl);
    });

    /* 1回タップ → 選択
       同じ日をもう1回タップ → 予定追加 */
    cell.addEventListener("click", () => {

      if (selectedCell === cell) {
        openAdd(dateStr);
        return;
      }

      if (selectedCell) {
        selectedCell.classList.remove("selected-day");
      }
      cell.classList.add("selected-day");
      selectedCell = cell;

      showDayEvents(dateStr);
    });

    calendarEl.appendChild(cell);
  }

  renderAllEvents();
}

/* -------------------------
   日付文字列
------------------------- */
function toStr(d){
  const y=d.getFullYear();
  const m=("0"+(d.getMonth()+1)).slice(-2);
  const da=("0"+d.getDate()).slice(-2);
  return `${y}-${m}-${da}`;
}
function isSame(a,b){
  return a.getFullYear()==b.getFullYear() &&
         a.getMonth()==b.getMonth() &&
         a.getDate()==b.getDate();
}

/* -------------------------
   予定取得（〇日のみ）
------------------------- */
function getEvents(dateObj){
  const res=[];
  const ds=toStr(dateObj);
  const dow=dateObj.getDay();
  const day=dateObj.getDate();
  const lastDigit = String(day).slice(-1);
  const mon=dateObj.getMonth()+1;

  events.forEach(ev=>{
    const base=new Date(ev.baseDate);

    // ① 繰り返しなし（当日だけ）
    if(ev.repeat==="none" && ev.baseDate===ds) {
      res.push(ev);
      return;
    }

    // ② 毎週
    if(ev.repeat==="weekly" && dateObj>=base && base.getDay()===dow) {
      res.push(ev);
    }

    // ③ 毎月
    if(ev.repeat==="monthly" && dateObj>=base && base.getDate()===day) {
      res.push(ev);
    }

    // ④ 毎年
    if(ev.repeat==="yearly" && base.getMonth()+1===mon && base.getDate()===day) {
      res.push(ev);
    }

    // ⑤ 〇日が付く日（digits が空のときは無視）
    if (ev.digits && ev.digits.length > 0 && ev.digits.includes(lastDigit) && dateObj>=base) {
      res.push(ev);
    }
  });

  return res;
}

/* -------------------------
   1日タップ → 下に予定一覧
------------------------- */
function showDayEvents(dateStr){
  const dateObj = new Date(dateStr);
  const list = getEvents(dateObj);

  let html = `<h3>${dateObj.getMonth()+1}月${dateObj.getDate()}日の予定</h3>`;

  if (list.length === 0) {
    html += "<p>予定はありません</p>";
  } else {
    html += list.map(ev => `
      <div style="margin:6px 0;padding:6px;background:#f0f0f0;border-radius:4px;">
        <b style="color:${ev.color}">${ev.title}</b><br>
        <button onclick="openEdit('${ev.id}')">編集</button>
        <button onclick="deleteFromList('${ev.id}')">削除</button>
      </div>
    `).join("");
  }

  document.getElementById("dayEventList").innerHTML = html;
}

function deleteFromList(id){
  events = events.filter(e => e.id !== id);
  saveEvents();
  renderCalendar();
  document.getElementById("dayEventList").innerHTML = "";
}

/* -------------------------
   全予定一覧
------------------------- */
function renderAllEvents(){
  const box = document.getElementById("allEventList");

  if (events.length === 0) {
    box.innerHTML = "<p>全体の予定はありません</p>";
    return;
  }

  let html = "<h3>全予定一覧</h3>";

  events.forEach(ev => {
    html += `
      <div style="margin:6px 0;padding:6px;background:#eee;border-radius:4px;">
        <b style="color:${ev.color}">${ev.title}</b><br>
        基準日：${ev.baseDate}<br>
        <button onclick="openEdit('${ev.id}')">編集</button>
        <button onclick="deleteFromList('${ev.id}')">削除</button>
      </div>
    `;
  });

  box.innerHTML = html;
}

/* -------------------------
   モーダル制御
------------------------- */
const modalBg = document.getElementById("modalBg");
const modalTitle = document.getElementById("modalTitle");
const modalEventTitle = document.getElementById("modalEventTitle");
const modalRepeat = document.getElementById("modalRepeat");
const modalDelete = document.getElementById("modalDelete");

document.getElementById("modalClose").onclick = () => {
  modalBg.style.display = "none";
};

/* -------------------------
   色選択
------------------------- */
document.getElementById("modalColors").onclick = e => {
  if (e.target.tagName === "BUTTON") {
    modalColor = e.target.dataset.color;

    document.querySelectorAll("#modalColors button")
      .forEach(btn => btn.classList.remove("selected"));

    e.target.classList.add("selected");
  }
};

/* -------------------------
   数字チェック
------------------------- */
function getSelectedDigits() {
  const boxes = document.querySelectorAll("#digitBoxes input");
  return [...boxes].filter(b => b.checked).map(b => b.value);
}
function setSelectedDigits(arr) {
  const boxes = document.querySelectorAll("#digitBoxes input");
  boxes.forEach(b => b.checked = arr.includes(b.value));
}

/* -------------------------
   タイトル候補（サジェスト）
------------------------- */
function getTitleCandidates(){
  return [...new Set(events.map(ev => ev.title))];
}

modalEventTitle.addEventListener("input", () => {
  const val = modalEventTitle.value.trim();
  const list = getTitleCandidates().filter(t => t.includes(val));

  const box = document.getElementById("titleSuggest");

  if (val === "" || list.length === 0) {
    box.style.display = "none";
    return;
  }

  box.innerHTML = list.map(t => `<div class="suggest-item">${t}</div>`).join("");
  box.style.display = "block";

  document.querySelectorAll(".suggest-item").forEach(item => {
    item.onclick = () => {
      modalEventTitle.value = item.textContent;
      box.style.display = "none";
    };
  });
});

/* -------------------------
   予定追加モード
------------------------- */
function openAdd(dateStr){
  selectedDate = dateStr;
  editingId = null;

  modalTitle.textContent = "予定を追加";
  modalEventTitle.value = "";
  modalRepeat.value = "none";
  modalColor = "#007bff";
  modalDelete.style.display = "none";
  setSelectedDigits([]);

  document.querySelectorAll("#modalColors button")
    .forEach(btn => btn.classList.remove("selected"));
  document.querySelector("#modalColors button[data-color='#007bff']")
    .classList.add("selected");

  modalBg.style.display = "flex";
}

/* -------------------------
   予定編集モード
------------------------- */
function openEdit(id){
  editingId = id;
  const ev = events.find(e => e.id === id);

  modalTitle.textContent = "予定を編集";
    modalEventTitle.value = ev.title;
  modalRepeat.value = ev.repeat;
  modalColor = ev.color;
  modalDelete.style.display = "inline-block";
  setSelectedDigits(ev.digits || []);

  document.querySelectorAll("#modalColors button")
    .forEach(btn => btn.classList.remove("selected"));
  document.querySelector(`#modalColors button[data-color='${ev.color}']`)
    .classList.add("selected");

  modalBg.style.display = "flex";
}

/* -------------------------
   保存処理
------------------------- */
document.getElementById("modalSave").onclick = () => {
  const title = modalEventTitle.value.trim();
  if (!title) return;

  const repeat = modalRepeat.value;
  const digits = getSelectedDigits();

  if (editingId === null) {
    events.push({
      id: Date.now().toString(),
      title,
      color: modalColor,
      baseDate: selectedDate,
      repeat,
      digits
    });
  } else {
    const ev = events.find(e => e.id === editingId);
    ev.title = title;
    ev.color = modalColor;
    ev.repeat = repeat;
    ev.digits = digits;
  }

  saveEvents();
  modalBg.style.display = "none";
  renderCalendar();
};

/* -------------------------
   削除処理
------------------------- */
modalDelete.onclick = () => {
  events = events.filter(e => e.id !== editingId);
  saveEvents();
  modalBg.style.display = "none";
  renderCalendar();
};

/* -------------------------
   月移動
------------------------- */
document.getElementById("prevMonth").onclick = () => {
  currentMonth--;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendar();
};

document.getElementById("nextMonth").onclick = () => {
  currentMonth++;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  renderCalendar();
};

/* -------------------------
   スワイプで月移動
------------------------- */
let startX = 0;
const swipeArea = document.getElementById("swipeArea");

swipeArea.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

swipeArea.addEventListener("touchend", e => {
  const diff = e.changedTouches[0].clientX - startX;
  if (Math.abs(diff) > 50) {
    if (diff < 0) {
      currentMonth++;
      if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    } else {
      currentMonth--;
      if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    }
    renderCalendar();
  }
});

/* -------------------------
   初期化
------------------------- */
initYM();
renderCalendar();
</script>

</body>
</html>
