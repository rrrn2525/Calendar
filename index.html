<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>カレンダー完成版</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: system-ui, sans-serif;
    margin: 0;
    padding: 10px;
    background: #f5f5f5;
  }
  .calendar-wrapper {
    max-width: 480px;
    margin: 0 auto;
    background: #fff;
    border-radius: 8px;
    padding: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  }
  .cal-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .cal-header button {
    padding: 4px 8px;
    font-size: 14px;
  }
  .cal-title {
    font-weight: bold;
    font-size: 16px;
  }
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    align-content: start;
  }
  .dow {
    text-align: center;
    font-size: 12px;
    padding: 4px 0;
    background: #f0f0f0;
    font-weight: bold;
  }
  .day-cell {
    min-height: 60px;
    background: #fafafa;
    border-radius: 4px;
    padding: 2px;
    font-size: 11px;
    position: relative;
  }
  .today {
    outline: 2px solid #ff4d4d;
    background: #ffecec;
  }
  .event {
    margin-top: 2px;
    padding: 1px 2px;
    border-radius: 3px;
    color: #fff;
    font-size: 10px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .event button {
    background: rgba(0,0,0,0.3);
    border: none;
    color: #fff;
    font-size: 10px;
    margin-left: 4px;
    cursor: pointer;
    border-radius: 2px;
    padding: 0 3px;
  }

  /* 編集モーダル */
  .modal-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.4);
    display: none;
    justify-content: center;
    align-items: center;
  }
  .modal {
    background: #fff;
    padding: 15px;
    width: 90%;
    max-width: 360px;
    border-radius: 8px;
  }
  .modal input, .modal select {
    width: 100%;
    padding: 6px;
    margin-bottom: 8px;
  }
  .modal .color-buttons button {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: none;
    margin-right: 4px;
  }
  .modal .btn-row {
    display: flex;
    justify-content: space-between;
  }
  .modal button {
    padding: 6px 10px;
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="calendar-wrapper" id="swipeArea">
  <div class="cal-header">
    <button id="prevMonth">&lt;</button>
    <div class="cal-title" id="calTitle"></div>
    <button id="nextMonth">&gt;</button>
  </div>

  <div class="calendar-grid" id="calendar"></div>

  <div class="controls">
    <label>予定タイトル</label>
    <input type="text" id="eventTitle">

    <label>繰り返し</label>
    <select id="repeatType">
      <option value="none">なし</option>
      <option value="weekly">毎週</option>
      <option value="monthly">毎月</option>
      <option value="yearly">毎年</option>
    </select>

    <label>色</label>
    <div class="color-buttons" id="colorButtons">
      <button data-color="#007bff" style="background:#007bff"></button>
      <button data-color="#28a745" style="background:#28a745"></button>
      <button data-color="#ffc107" style="background:#ffc107"></button>
      <button data-color="#dc3545" style="background:#dc3545"></button>
      <button data-color="#6f42c1" style="background:#6f42c1"></button>
    </div>
    <small>日付を押すと予定追加（タイトルは初期化）</small>
  </div>
</div>

<!-- 編集モーダル -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>予定を編集</h3>
    <input type="text" id="editTitle">
    <select id="editRepeat">
      <option value="none">なし</option>
      <option value="weekly">毎週</option>
      <option value="monthly">毎月</option>
      <option value="yearly">毎年</option>
    </select>

    <div class="color-buttons" id="editColors">
      <button data-color="#007bff" style="background:#007bff"></button>
      <button data-color="#28a745" style="background:#28a745"></button>
      <button data-color="#ffc107" style="background:#ffc107"></button>
      <button data-color="#dc3545" style="background:#dc3545"></button>
      <button data-color="#6f42c1" style="background:#6f42c1"></button>
    </div>

    <div class="btn-row">
      <button id="saveEdit">保存</button>
      <button id="deleteEdit">削除</button>
      <button id="closeEdit">閉じる</button>
    </div>
  </div>
</div>

<script>
/* -------------------------
   基本変数
------------------------- */
let events = [];
let currentColor = "#007bff";
let editColor = "#007bff";
let editingId = null;

const today = new Date();
let currentYear = today.getFullYear();
let currentMonth = today.getMonth();

const calendarEl = document.getElementById("calendar");
const calTitleEl = document.getElementById("calTitle");

/* -------------------------
   保存・読み込み
------------------------- */
function saveEvents() {
  localStorage.setItem("calendarEvents", JSON.stringify(events));
}
function loadEvents() {
  const data = localStorage.getItem("calendarEvents");
  if (data) events = JSON.parse(data);
}
loadEvents();

/* -------------------------
   色選択
------------------------- */
document.getElementById("colorButtons").addEventListener("click", e => {
  if (e.target.tagName === "BUTTON") {
    currentColor = e.target.dataset.color;
  }
});

/* -------------------------
   カレンダー描画
------------------------- */
function renderCalendar() {
  calendarEl.innerHTML = "";

  const dow = ["日","月","火","水","木","金","土"];
  dow.forEach(d => {
    const h = document.createElement("div");
    h.className = "dow";
    h.textContent = d;
    calendarEl.appendChild(h);
  });

  const first = new Date(currentYear, currentMonth, 1);
  const startDow = first.getDay();
  const days = new Date(currentYear, currentMonth + 1, 0).getDate();

  calTitleEl.textContent = `${currentYear}年 ${currentMonth+1}月`;

  for (let i=0;i<startDow;i++){
    const empty = document.createElement("div");
    empty.className = "day-cell";
    calendarEl.appendChild(empty);
  }

  for (let d=1; d<=days; d++){
    const cell = document.createElement("div");
    cell.className = "day-cell";

    const dateObj = new Date(currentYear, currentMonth, d);
    const dateStr = toStr(dateObj);

    if (isSame(dateObj, today)) cell.classList.add("today");

    const num = document.createElement("div");
    num.textContent = d;
    num.style.fontWeight = "bold";
    cell.appendChild(num);

    getEvents(dateObj).forEach(ev => {
      const evEl = document.createElement("div");
      evEl.className = "event";
      evEl.style.background = ev.color;
      evEl.textContent = ev.title;
      evEl.dataset.id = ev.id;

      evEl.addEventListener("click", e => {
        e.stopPropagation();
        openEdit(ev.id);
      });

      cell.appendChild(evEl);
    });

    cell.addEventListener("click", () => {
      document.getElementById("eventTitle").value = "";
      addEvent(dateStr);
    });

    calendarEl.appendChild(cell);
  }
}

/* -------------------------
   日付文字列
------------------------- */
function toStr(d){
  const y=d.getFullYear();
  const m=("0"+(d.getMonth()+1)).slice(-2);
  const da=("0"+d.getDate()).slice(-2);
  return `${y}-${m}-${da}`;
}
function isSame(a,b){
  return a.getFullYear()==b.getFullYear() &&
         a.getMonth()==b.getMonth() &&
         a.getDate()==b.getDate();
}

/* -------------------------
   予定取得（繰り返し対応）
------------------------- */
function getEvents(dateObj){
  const res=[];
  const ds=toStr(dateObj);
  const dow=dateObj.getDay();
  const day=dateObj.getDate();
  const mon=dateObj.getMonth()+1;

  events.forEach(ev=>{
    const base=new Date(ev.baseDate);

    if(ev.repeat==="none" && ev.baseDate===ds) res.push(ev);
    if(ev.repeat==="weekly" && dateObj>=base && base.getDay()===dow) res.push(ev);
    if(ev.repeat==="monthly" && dateObj>=base && base.getDate()===day) res.push(ev);
    if(ev.repeat==="yearly" && dateObj>=base &&
       base.getMonth()+1===mon && base.getDate()===day) res.push(ev);
  });

  return res;
}

/* -------------------------
   予定追加
------------------------- */
function addEvent(dateStr){
  const title=document.getElementById("eventTitle").value.trim();
  if(!title) return;

  const repeat=document.getElementById("repeatType").value;

  events.push({
    id: Date.now().toString(),
    title,
    color: currentColor,
    baseDate: dateStr,
    repeat
  });

  saveEvents();
  renderCalendar();
}

/* -------------------------
   編集モーダル
------------------------- */
const modalBg=document.getElementById("modalBg");

function openEdit(id){
  editingId=id;
  const ev=events.find(e=>e.id===id);

  document.getElementById("editTitle").value=ev.title;
  document.getElementById("editRepeat").value=ev.repeat;
  editColor=ev.color;

  modalBg.style.display="flex";
}

document.getElementById("closeEdit").onclick=()=>{
  modalBg.style.display="none";
};

document.getElementById("deleteEdit").onclick=()=>{
  events=events.filter(e=>e.id!==editingId);
  saveEvents();
  modalBg.style.display="none";
  renderCalendar();
};

document.getElementById("editColors").onclick=(e)=>{
  if(e.target.tagName==="BUTTON"){
    editColor=e.target.dataset.color;
  }
};

document.getElementById("saveEdit").onclick=()=>{
  const ev=events.find(e=>e.id===editingId);
  ev.title=document.getElementById("editTitle").value;
  ev.repeat=document.getElementById("editRepeat").value;
  ev.color=editColor;

  saveEvents();
  modalBg.style.display="none";
  renderCalendar();
};

/* -------------------------
   月移動
------------------------- */
document.getElementById("prevMonth").onclick=()=>{
  currentMonth--;
  if(currentMonth<0){ currentMonth=11; currentYear--; }
  renderCalendar();
};
document.getElementById("nextMonth").onclick=()=>{
  currentMonth++;
  if(currentMonth>11){ currentMonth=0; currentYear++; }
  renderCalendar();
};

/* -------------------------
   スワイプで月切り替え
------------------------- */
let startX=0;
const swipeArea=document.getElementById("swipeArea");

swipeArea.addEventListener("touchstart", e=>{
  startX=e.touches[0].clientX;
});
swipeArea.addEventListener("touchend", e=>{
  const endX=e.changedTouches[0].clientX;
  const diff=endX-startX;

  if(Math.abs(diff)>50){
    if(diff<0){
      currentMonth++;
      if(currentMonth>11){ currentMonth=0; currentYear++; }
    }else{
      currentMonth--;
      if(currentMonth<0){ currentMonth=11; currentYear--; }
    }
    renderCalendar();
  }
});

/* PCドラッグでもスワイプ扱い */
let mouseDown=false;
swipeArea.addEventListener("mousedown", e=>{
  mouseDown=true;
  startX=e.clientX;
});
swipeArea.addEventListener("mouseup", e=>{
  if(!mouseDown) return;
  mouseDown=false;

  const diff=e.clientX-startX;
  if(Math.abs(diff)>50){
    if(diff<0){
      currentMonth++;
      if(currentMonth>11){ currentMonth=0; currentYear++; }
    }else{
      currentMonth--;
      if(currentMonth<0){ currentMonth=11; currentYear--; }
    }
    renderCalendar();
  }
});

/* -------------------------
   初期描画
------------------------- */
renderCalendar();
</script>
</body>
</html>
